[package]
name = "serVault"
version = "0.1.0"
edition = "2024"


[[bin]]
name = "server"
path = "src/main.rs"

[dependencies]
tokio = { version = "1.50.0", features = ["full"] }

serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
hex = "0.4"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
thiserror = "1"
anyhow = "1"
